<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ static_url_for('static', filename='css/app.css') }}">
    <link rel="icon" href="/favicon.svg" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg px-0 px-lg-3 ">
      <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
          data-bs-target="#navbarCollapse" aria-controls="navbarCollapse"
          aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <a class="d-none d-lg-inline-block navbar-brand" href="#">
          🦀 GRAIN
        </a>
        <div class="navbar-nav align-items-center ms-auto order-lg-last">
          
        </div>
        <div class="collapse navbar-collapse" id="navbarCollapse">
          <ul class="nav nav-underline gap-6 overflow-x border-bottom">
            <li class="nav-item">
              <a href="{{ url_for('page.home') }}" class="nav-link{% if active_page == 'dashboard' %} active{% endif %}">Dashboard</a>
            </li>
            <li class="nav-item">
              <a href="{{ url_for('page.upload_image') }}" class="nav-link{% if active_page == 'upload' %} active{% endif %}">Upload</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-fluid">
      {% block body %}{% endblock %}
    </div>
    <script defer src="{{ static_url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
